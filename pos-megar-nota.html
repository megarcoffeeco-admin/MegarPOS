<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e3a1e" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Nota — Megar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --green-deep:  #1e3a1e;
      --green-mid:   #2d4a2d;
      --green-soft:  #4a7c4a;
      --green-light: #7aab6e;
      --green-pale:  #e8f2e8;
      --cream:       #f5f0e8;
      --cream-dark:  #e0d8c8;
      --warm-white:  #fdfaf5;
      --brown:       #8b6340;
      --text-dark:   #1a2e1a;
      --text-mid:    #3d5c3d;
      --text-light:  #7a9a7a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }

    /* ── Action Bar ── */
    .action-bar {
      width: 100%;
      max-width: 400px;
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .btn-screenshot {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--green-mid);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(30,58,30,0.25);
      transition: all 0.15s;
    }
    .btn-screenshot:hover { background: var(--green-soft); }
    .btn-screenshot:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      background: #25D366;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(37,211,102,0.3);
    }

    /* ── Nota Card ── */
    .nota-wrap {
      width: 100%;
      max-width: 400px;
    }

    #notaCard {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    /* Header */
    .nota-header {
      background: var(--green-deep);
      padding: 24px 24px 20px;
      text-align: center;
      position: relative;
    }
    .nota-header::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0; right: 0;
      height: 24px;
      background: white;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .nota-brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 4px;
    }
    .nota-tagline {
      font-size: 11px;
      color: var(--green-light);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Body */
    .nota-body {
      padding: 20px 24px 0;
    }

    /* Nota info row */
    .nota-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 0 12px;
      border-bottom: 1px dashed var(--cream-dark);
      margin-bottom: 14px;
    }
    .nota-info-left {}
    .nota-no {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--green-soft);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .nota-datetime {
      font-size: 12px;
      color: var(--text-mid);
    }
    .nota-kasir-tag {
      font-size: 11px;
      background: var(--green-pale);
      color: var(--green-mid);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* Items */
    .nota-items {
      margin-bottom: 14px;
    }
    .nota-item-row {
      display: flex;
      align-items: baseline;
      padding: 5px 0;
      gap: 8px;
    }
    .nota-item-name {
      flex: 1;
      font-size: 13px;
      color: var(--text-dark);
      font-weight: 500;
    }
    .nota-item-qty {
      font-size: 12px;
      color: var(--text-light);
      min-width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .nota-item-price {
      font-size: 13px;
      color: var(--text-dark);
      font-weight: 500;
      min-width: 80px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Divider */
    .nota-divider {
      border: none;
      border-top: 1px dashed var(--cream-dark);
      margin: 10px 0;
    }

    /* Total */
    .nota-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 6px;
    }
    .nota-total-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-mid);
    }
    .nota-total-amount {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--green-deep);
    }
    .nota-metode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 14px;
    }
    .nota-metode-label {
      font-size: 11px;
      color: var(--text-light);
    }
    .nota-metode-val {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      background: var(--green-pale);
      padding: 2px 10px;
      border-radius: 10px;
    }

    /* Notes */
    .nota-notes {
      background: var(--warm-white);
      border: 1px solid var(--cream-dark);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--text-mid);
      font-style: italic;
    }
    .nota-notes-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-style: normal;
    }

    /* Footer */
    .nota-footer {
      background: var(--green-pale);
      padding: 16px 24px;
      text-align: center;
      margin-top: 4px;
      position: relative;
    }
    .nota-footer::before {
      content: '';
      position: absolute;
      top: -12px; left: 0; right: 0;
      height: 24px;
      background: var(--green-pale);
      border-radius: 0 0 50% 50% / 0 0 100% 100%;
    }
    .nota-thanks {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: var(--green-mid);
      font-style: italic;
      margin-bottom: 4px;
    }
    .nota-footer-sub {
      font-size: 10px;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    /* Perforated edge simulation */
    .perforated {
      height: 16px;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 10px,
        #e8e8e8 10px,
        #e8e8e8 14px
      );
      position: relative;
    }
    .perforated::before {
      content: '';
      position: absolute;
      top: 50%; left: -8px;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      background: #e8e8e8;
      border-radius: 50%;
    }
    .perforated::after {
      content: '';
      position: absolute;
      top: 50%; right: -8px;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      background: #e8e8e8;
      border-radius: 50%;
    }

    /* Loading */
    .loading-nota {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
      font-size: 14px;
    }

    /* Screenshot hint */
    .screenshot-hint {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="action-bar">
  <button class="btn-back" id="backBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Kembali
  </button>
  <button class="btn-screenshot" id="screenshotBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Simpan Gambar
  </button>
  <button class="btn-wa" id="waBtnNota">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </button>
</div>

<div class="nota-wrap">
  <div id="notaCard">
    <div class="loading-nota">Memuat nota...</div>
  </div>
  <div class="screenshot-hint">Tap "Simpan Gambar" untuk menyimpan nota sebagai foto</div>
</div>

<script>
// ── Load data dari sessionStorage ──
const raw = sessionStorage.getItem('megar_last_nota');
if (!raw) {
  document.getElementById('notaCard').innerHTML = '<div class="loading-nota">Data nota tidak ditemukan.<br>Kembali ke halaman transaksi.</div>';
} else {
  const nota = JSON.parse(raw);
  renderNota(nota);
}

function renderNota(d) {
  const now = new Date();
  const tgl = d.timestamp
    ? new Date(d.timestamp).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
    : now.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  const jam = d.timestamp
    ? new Date(d.timestamp).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })
    : now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

  const itemRows = d.items.map(item => `
    <div class="nota-item-row">
      <span class="nota-item-name">${item.nama}</span>
      <span class="nota-item-qty">×${item.qty}</span>
      <span class="nota-item-price">${formatRp(item.subtotal)}</span>
    </div>
  `).join('');

  const notesSection = d.notes ? `
    <div class="nota-notes">
      <div class="nota-notes-label">Catatan</div>
      ${d.notes}
    </div>
  ` : '';

  document.getElementById('notaCard').innerHTML = `
    <div class="nota-header">
      <div class="nota-brand">Megar</div>
      <div class="nota-tagline">Coffee &amp; Co</div>
    </div>

    <div class="nota-body">
      <div class="nota-info">
        <div class="nota-info-left">
          <div class="nota-no">${d.noNota}</div>
          <div class="nota-datetime">${tgl} · ${jam}</div>
        </div>
        <div class="nota-kasir-tag">${d.kasirNama}</div>
      </div>

      <div class="nota-items">
        ${itemRows}
      </div>

      <hr class="nota-divider" />

      <div class="nota-total-row">
        <span class="nota-total-label">Total</span>
        <span class="nota-total-amount">${formatRp(d.total)}</span>
      </div>
      <div class="nota-metode-row">
        <span class="nota-metode-label">Metode Pembayaran</span>
        <span class="nota-metode-val">${d.metodeBayar}</span>
      </div>

      ${notesSection}
    </div>

    <div class="perforated"></div>

    <div class="nota-footer">
      <div class="nota-thanks">Terima kasih atas kunjungannya!</div>
      <div class="nota-footer-sub">Megar — Coffee & Co</div>
    </div>
  `;

  // WA button
  document.getElementById('waBtnNota').onclick = () => {
    const text = buildWAText(d);
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  };
}

// ── Screenshot ──
document.getElementById('screenshotBtn').addEventListener('click', async () => {
  const btn = document.getElementById('screenshotBtn');
  btn.disabled = true;
  btn.textContent = 'Memproses...';

  try {
    const card = document.getElementById('notaCard');
    const canvas = await html2canvas(card, {
      scale: 3,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });

    const nota = JSON.parse(sessionStorage.getItem('megar_last_nota') || '{}');
    const filename = (nota.noNota || 'nota-megar').replace(/[^a-zA-Z0-9-]/g, '_') + '.png';

    // Download
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();

    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Tersimpan!`;
    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Simpan Gambar`;
    }, 2500);
  } catch(e) {
    alert('Gagal menyimpan gambar. Coba screenshot manual.');
    btn.disabled = false;
    btn.textContent = 'Simpan Gambar';
  }
});

// ── Back ──
document.getElementById('backBtn').addEventListener('click', () => {
  window.location.replace('pos-megar-transaksi.html');
});

// ── Helpers ──
function formatRp(num) {
  return 'Rp ' + Number(num).toLocaleString('id-ID');
}

function buildWAText(d) {
  const now = new Date();
  const tgl = now.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
  const jam = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
  let txt = `☕ *Megar — Coffee & Co*\n`;
  txt += `📋 ${d.noNota}\n`;
  txt += `🕐 ${tgl}, ${jam}\n`;
  txt += `👤 Kasir: ${d.kasirNama}\n\n`;
  txt += `*Pesanan:*\n`;
  d.items.forEach(i => { txt += `• ${i.nama} ×${i.qty} — ${formatRp(i.subtotal)}\n`; });
  txt += `\n*Total: ${formatRp(d.total)}*\n`;
  txt += `💳 ${d.metodeBayar}\n`;
  if (d.notes) txt += `\n📝 ${d.notes}\n`;
  txt += `\nTerima kasih! 🌿`;
  return txt;
}
</script>
</body>
</html>
